l>${info(id)}</small>`:`❔<span>${label}</span>`}function res(id,ok){RS.className='slot '+(ok?'ok':'bad');RS.innerHTML=id?`${icon(id)}<span>${name(id)}</span>`:'✨<span>Ergebnis</span>'}function prog(c){return d.filter(x=>C[x]===c).length+' / '+Object.keys(C).filter(x=>C[x]===c).length}function rank(){let n=MISS.filter(m=>m[2].every(x=>d.includes(x))).length;return n>=8?'Chemie-Meister':n>=6?'Umwelt-Profi':n>=4?'Reaktions-Profi':n>=2?'Chemie-Starter':'Starter'}function unlock(store){let u=[];function add(c,cond){if(cond)(SEED[c]||[]).forEach(id=>{if(!d.includes(id)){d.push(id);if(!u.includes(c))u.push(c)}})}add('stoffe',d.includes('stoffgemisch')||d.includes('loesung'));add('teil',d.includes('teilchenmodell')||d.includes('atom'));add('reak',d.includes('reaktion')||d.includes('produkt'));add('brand',d.includes('verbrennung')||d.includes('oxidation'));add('umwelt',d.includes('kohlenstoffdioxid')||d.includes('atmosphaere')||d.includes('ozon'));add('redox',d.includes('oxidation')||d.includes('metalloxid')||d.includes('redox'));if(store&&u.length)save();return u}function missions(){q('#missions').innerHTML=MISS.map(m=>{let n=m[2].filter(x=>d.includes(x)).length,ok=n===m[2].length;return `<article class="mission ${ok?'done':''}"><div class=mt>${ok?'✅':'🎯'} Mission: ${m[0]}</div><div class=mi>${m[1]}</div><b>${n} / ${m[2].length} entdeckt</b><div class=targets>${m[2].map(x=>`<span class=${d.includes(x)?'done':''}>${icon(x)} ${name(x)}</span>`).join('')}</div></article>`}).join('')}function render(nid){let cats=Object.keys(CAT).filter(c=>d.some(x=>C[x]===c));if(nid&&C[nid])active=C[nid];if(!cats.includes(active))active=cats[0]||'grund';grid.innerHTML=`<div class=tabs>${cats.map(c=>`<button class="tab ${c===active?'active':''}" onclick="active='${c}';render();msg.innerHTML='Kategorie gewechselt: <b>${CAT[c]}</b>'">${CAT[c]} · ${prog(c)}</button>`).join('')}</div><div class=head>${CAT[active]} <span style="float:right">${prog(active)}</span></div>`;let s=q('#search').value.toLo
