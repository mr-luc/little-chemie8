const SEED={stoffe:['stoffgemisch','trennverfahren','loeslichkeit'],teilchen:['atom','molekuel','element'],reak:['reaktion','edukt','produkt'],brand:['verbrennung','kohlenstoffdioxid','branddreieck'],ph:['indikator','base'],redox:['metall','metalloxid']};let d=[...START],sel=null,last='',coins=5,active='grund';const S='little-chemie8-save-v1',CS='little-chemie8-coins-v1';const q=x=>document.querySelector(x),grid=q('#grid'),msg=q('#msg'),A=q('#a'),B=q('#b'),RS=q('#r');function load(){try{d=[...new Set([...START,...JSON.parse(localStorage.getItem(S)||'[]').filter(x=>I[x])])];coins=Number(localStorage.getItem(CS));if(!Number.isFinite(coins))coins=5}catch{d=[...START];coins=5}unlock(false)}function save(){localStorage.setItem(S,JSON.stringify(d.filter(x=>!START.includes(x))));localStorage.setItem(CS,coins)}function icon(id){return I[id][1]}function name(id){return I[id][0]}function info(id){return I[id][2]}function card(id){return `<div class=sym>${icon(id)}</div><div class=name>${name(id)}</div><div class=info>${info(id)}</div>`}function slot(el,id,label){el.className='slot'+(id?' on':'');el.innerHTML=id?`${icon(id)}<span>${name(id)}</span><small>${info(id)}</small>`:`❔<span>${label}</span>`}function res(id,ok){RS.className='slot '+(ok?'ok':'bad');RS.innerHTML=id?`${icon(id)}<span>${name(id)}</span>`:'✨<span>Ergebnis</span>'}function prog(c){return d.filter(x=>C[x]===c).length+' / '+Object.keys(C).filter(x=>C[x]===c).length}function rank(){let done=MISS.filter(m=>m[2].every(x=>d.includes(x))).length;return done>=7?'Chemie-Meister':done>=5?'Reaktions-Profi':done>=3?'Teilchen-Profi':done>=1?'Chemie-Starter':'Starter'}function unlock(store){let u=[];function add(c,cond){if(cond)(SEED[c]||[]).forEach(id=>{if(!d.includes(id)){d.push(id);if(!u.includes(c))u.push(c)}})}add('stoffe',d.includes('stoffgemisch')||d.includes('loesung'));add('teilchen',d.includes('teilchenmodell')||d.includes('atom'));add('reak',d.includes('reaktion')||d.includes('produkt'));add('brand',d.includes('verbrennung')||d.includes('oxidation'));add('ph',d.includes('indikator')||d.includes('saureloesung'));add('redox',d.includes('oxidation')||d.includes('metalloxid')||d.includes('redox'));if(store&&u.length)save();return u}function missions(){q('#missions').innerHTML=MISS.map(m=>{let n=m[2].filter(x=>d.includes(x)).length,ok=n===m[2].length;return `<article class="mission ${ok?'done':n?'active':''}"><div class=mt>${ok?'✅':'🎯'} Mission: ${m[0]}</div><div class=mi>${m[1]}</div><b>${n} / ${m[2].length} entdeckt</b><div class=targets>${m[2].map(x=>`<span class=${d.includes(x)?'done':''}>${icon(x)} ${name(x)}</span>`).join('')}</div></article>`}).join('')}function render(nid){let cats=Object.keys(CAT).filter(c=>d.some(x=>C[x]===c));if(nid&&C[nid])active=C[nid];if(!cats.includes(active))active=cats[0]||'grund';grid.innerHTML=`<div class=tabs>${cats.map(c=>`<button class="tab ${c===active?'active':''}" onclick="active='${c}';render();msg.innerHTML='Kategorie gewechselt: <b>${CAT[c]}</b>'">${CAT[c]} · ${prog(c)}</button>`).join('')}</div><div class=head>${CAT[active]} <span style="float:right">${prog(active)}</span></div>`;let s=q('#search').value.toLowerCase();d.filter(x=>C[x]===active&&(!s||name(x).toLowerCase().includes(s))).forEach(id=>{let el=document.createElement('article');el.className='card '+(sel===id?'sel ':'')+(nid===id?'new':'');el.innerHTML=card(id);el.onclick=()=>choose(id);grid.appendChild(el)});q('#count').textContent=d.length+' / '+Object.keys(I).length;q('#badge').textContent=rank();q('#coins').textContent='🪙 '+coins;missions()}function choose(id){if(!sel){sel=id;slot(A,id);slot(B,null,'2. Begriff');res(null,true);msg.innerHTML=`<b>${icon(id)} ${name(id)}</b>: ${info(id)}<br>Wähle jetzt einen zweiten Begriff.`;render();return}slot(B,id);combine(sel,id);sel=null}function combine(a,b){let c=R[k(a,b)];if(!c){res(null,false);msg.innerHTML='Gute Idee, aber daraus entsteht im Spiel noch kein neuer Fachbegriff.';setTimeout(resetSlots,1000);return}let neu=!d.includes(c);if(neu){d.push(c);coins+=2;save()}let f=`${name(a)} + ${name(b)} = ${name(c)}`,ex=E[c]||info(c);res(c,true);msg.innerHTML=`<b>${f}</b><br>${ex}${neu?'<br>🪙 +2 Münzen':''}`;let u=unlock(true);if(neu)show(c,f,ex);setTimeout(()=>{resetSlots();render(neu?c:null);if(u.length)msg.innerHTML='🔓 Neue Kategorie freigeschaltet: <b>'+u.map(x=>CAT[x]).join(', ')+'</b>'},1300)}function resetSlots(){slot(A,null,'1. Begriff');slot(B,null,'2. Begriff');res(null,true);render()}function show(id,f,ex){q('#pe').textContent=icon(id);q('#pt').textContent=name(id);q('#pf').textContent=f;q('#px').textContent=ex;q('#pop').classList.add('show')}function hint(){if(coins<3){msg.innerHTML='Ein Tipp kostet <b>3 Münzen</b>. Spiele Chemie-Blitz oder entdecke Begriffe.';return}let p=[];for(let i=0;i<d.length;i++)for(let j=i;j<d.length;j++){let c=R[k(d[i],d[j])];if(c&&!d.includes(c))p.push([d[i],d[j]])}if(!p.length){msg.textContent='Im Moment gibt es keinen neuen Tipp.';return}coins-=3;save();let x=p[Math.floor(Math.random()*p.length)];msg.innerHTML=`💡 Probiere <b>${icon(x[0])} ${name(x[0])}</b> + <b>${icon(x[1])} ${name(x[1])}</b>.`;render()}function reset(){localStorage.removeItem(S);localStorage.removeItem(CS);d=[...START];coins=5;sel=null;active='grund';q('#search').value='';save();resetSlots();msg.innerHTML='Neustart: Du beginnst mit <b>9 Grundbegriffen</b> und <b>5 Münzen</b>.'}
const QS=[['Was weist die Glimmspanprobe nach?','Sauerstoff',['Sauerstoff','Kohlenstoffdioxid','Wasser']],['Was sind Ausgangsstoffe?','Edukte',['Edukte','Produkte','Indikatoren']],['Was zeigt sauer oder alkalisch an?','Indikator',['Indikator','Katalysator','Filter']],['Was ist eine Reaktion mit Sauerstoff?','Oxidation',['Oxidation','Diffusion','Destillation']],['Was entsteht bei Säure + Base?','Neutralisation',['Neutralisation','Chromatografie','Suspension']],['Was ist ein Reinstoff aus einer Atomsorte?','Element',['Element','Gemisch','Lösung']],['Mehrere verbundene Atome bilden ein ...','Molekül',['Molekül','Filter','Branddreieck']],['Was sind Oxidation und Reduktion zusammen?','Redoxreaktion',['Redoxreaktion','Aggregatzustand','Lösung']]];function sh(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function quiz(){let qs=sh(QS).slice(0,3),i=0,ok=0;openGame('🧪 Chemie-Blitz');function ask(){let x=qs[i];q('#gs').textContent=`Frage ${i+1}/3 · richtig: ${ok}`;q('#gq').innerHTML='<h3>'+x[0]+'</h3>';q('#ga').innerHTML='';sh(x[2]).forEach(a=>{let b=document.createElement('button');b.textContent=a;b.onclick=()=>{if(a===x[1]){ok++;coins++;b.className='r';q('#gs').textContent='✅ Richtig! +1 Münze'}else{b.className='w';q('#gs').textContent='❌ Richtig wäre: '+x[1]}Array.from(q('#ga').children).forEach(c=>c.disabled=true);setTimeout(()=>{i++;i<3?ask():finish()},800)};q('#ga').appendChild(b)})}function finish(){if(ok===3){coins+=2;q('#gs').innerHTML='🏆 Perfekt! +2 Bonus-Münzen'}else q('#gs').textContent=`Fertig: ${ok}/3 richtig.`;save();render();q('#gq').innerHTML='';q('#ga').innerHTML='<button onclick="quiz()">Nochmal spielen</button>'}ask()}function openGame(t){q('#gt').textContent=t;q('#game').classList.add('show')}function galaxy(){let rounds=[['Stoffe',['Stoff','Reinstoff','Lösung','Filtrieren','Destillation'],['Reflex','Zellkern','Nerv']],['Teilchen',['Teilchen','Atom','Molekül','Element','Formel'],['Haut','Herz','Blatt']],['Reaktion',['Edukt','Produkt','Massenerhaltung','Exotherm','Katalysator'],['Auge','Vakuole','Muskel']],['Verbrennung',['Sauerstoff','Verbrennung','Oxidation','Glimmspanprobe','Branddreieck'],['Insulin','Chloroplast','Nahrungskette']],['Säure & Redox',['Säure','Indikator','pH-Wert','Reduktion','Redoxreaktion'],['Zellwand','Blutdruck','Pilz']]],r=rounds[Math.floor(Math.random()*rounds.length)],score=0,lives=2;openGame('🚀 Chemie-Galaxy');q('#gs').textContent='Triff nur passende Begriffe: '+r[0];q('#gq').innerHTML='<p>Klicke die richtigen Begriffe an. 5 Treffer = +5 Münzen.</p>';q('#ga').className='chips';q('#ga').innerHTML='';sh([...r[1],...r[2],...r[1]]).slice(0,10).forEach(w=>{let b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>{if(r[1].includes(w)){score++;b.classList.add('good')}else{lives--;b.classList.add('wrong')}b.disabled=true;q('#gs').textContent=`${r[0]} · Treffer: ${score}/5 · Leben: ${lives}`;if(score>=5||lives<=0){if(score>=5){coins+=5;q('#gs').textContent='🏆 Runde geschafft! +5 Münzen'}else q('#gs').textContent='💥 Runde verloren. Probiere es nochmal.';save();render();Array.from(q('#ga').children).forEach(x=>x.disabled=true);let again=document.createElement('button');again.className='chip';again.textContent='Neue Runde';again.onclick=galaxy;q('#ga').appendChild(again)}};q('#ga').appendChild(b)})}
q('#hint').onclick=hint;q('#reset').onclick=reset;q('#quiz').onclick=quiz;q('#galaxy').onclick=galaxy;q('#search').oninput=()=>render();document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>b.closest('.modal').classList.remove('show'));document.querySelectorAll('.modal').forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.remove('show')});load();resetSlots();msg.innerHTML='Starte mit <b>9 Grundbegriffen</b>. Entdecke neue Begriffe und arbeite die Missionen durch.';
</script></body></html>
